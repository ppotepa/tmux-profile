##### =========================================================
##### TMUX CONFIG — ULTIMATE WASD ONE-HAND PROFILE (v3)
##### Source of Truth: .tmux-wsad.conf
##### =========================================================

# Mark this profile as loaded
set -g @wsad_profile "loaded"

##### -----------------------------
##### Prefix (main tmux command key)
##### -----------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### -----------------------------
##### Core quality-of-life settings
##### -----------------------------
set -g mouse on
set -g history-limit 50000
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename on
set -sg escape-time 0
set -g detach-on-destroy off

# Terminal color settings
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

##### -----------------------------
##### Remove default bindings we override
##### -----------------------------
unbind %
unbind '"'
unbind q
unbind w
unbind d

##### -----------------------------
##### One-hand WASD layout (prefix + key)
##### -----------------------------

# Split panes (Q/E = build keys)
bind q split-window -v -c "#{pane_current_path}"
bind e split-window -h -c "#{pane_current_path}"

# Pane movement (WASD)
bind a select-pane -L
bind s select-pane -D
bind w select-pane -U
bind d select-pane -R

# Pane resize (Shift+WASD = "sprint resize")
bind -r A resize-pane -L 5
bind -r S resize-pane -D 5
bind -r W resize-pane -U 5
bind -r D resize-pane -R 5

# Pane utilities
bind z resize-pane -Z                  # Zoom/unzoom active pane
bind v copy-mode                       # Enter copy mode
bind f display-panes                   # Show pane numbers (Interactions)
set -g display-panes-time 2000         # Stay on screen longer for "scouting"
bind Space next-layout                 # Cycle pane layouts

##### -----------------------------
##### NEW: LEFT-HAND EXTENSIONS (v3)
##### -----------------------------

# Instant Movement (No Prefix - Alt/Meta keys)
bind -n M-a select-pane -L
bind -n M-s select-pane -D
bind -n M-w select-pane -U
bind -n M-d select-pane -R

# Instant Window Selection (No Prefix - Alt/Meta keys)
bind -n M-1 select-window -t:=1
bind -n M-2 select-window -t:=2
bind -n M-3 select-window -t:=3
bind -n M-4 select-window -t:=4
bind -n M-5 select-window -t:=5
bind -n M-6 select-window -t:=6

# Unit Rotation (Swap panes)
bind Q swap-pane -U
bind E swap-pane -D

# Tactical Utilities
bind t command-prompt -I "#W" "rename-window %%"   # T is for Type/Talk (Rename)
bind ` set-option status                           # Tilde/Console toggle for HUD
bind V paste-buffer                                # Shift-V to "Execute" (Paste)
bind F choose-tree -s                              # F for "Full Map" (Sessions)

# Focus Mode (Sniper Mode: Zoom + Hide HUD)
bind Z resize-pane -Z \; set-option status

##### -----------------------------
##### Windows (tabs)
##### -----------------------------
bind c new-window -c "#{pane_current_path}"
bind g choose-window                   # Window chooser (Map)
bind Tab last-window                   # Quick toggle

# RTS-style "control groups" (Prefix + 1..6)
bind 1 select-window -t:=1
bind 2 select-window -t:=2
bind 3 select-window -t:=3
bind 4 select-window -t:=4
bind 5 select-window -t:=5
bind 6 select-window -t:=6

# RTS-style "assign current window to slot" (Shift+1..6)
bind ! move-window -t:=1 \; select-window -t:=1 \; display-message "Window moved to slot 1"
bind @ move-window -t:=2 \; select-window -t:=2 \; display-message "Window moved to slot 2"
bind \# move-window -t:=3 \; select-window -t:=3 \; display-message "Window moved to slot 3"
bind '$' move-window -t:=4 \; select-window -t:=4 \; display-message "Window moved to slot 4"
bind % move-window -t:=5 \; select-window -t:=5 \; display-message "Window moved to slot 5"
bind ^ move-window -t:=6 \; select-window -t:=6 \; display-message "Window moved to slot 6"

##### -----------------------------
##### Session / tree / detach (F-key edition)
##### -----------------------------
bind F5 choose-tree
bind F6 detach-client

##### -----------------------------
##### Utility / safety bindings
##### -----------------------------
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
bind x confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind X confirm-before -p "Kill window #I:#W? (y/n)" kill-window
bind / command-prompt -p "Find window" "find-window '%%'"

##### =========================================================
##### DARK GAMER THEME
##### =========================================================
set -g status-position bottom
set -g status-style bg=colour234,fg=colour250
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=colour81,bg=colour236,bold] #S #[default]"
set -g status-right "#[fg=colour245]#(whoami)@#H #[fg=colour240]| #[fg=colour229]%Y-%m-%d #[fg=colour111]%H:%M #[default]"
set -g window-status-separator " "

# Window tabs
setw -g window-status-format "#[fg=colour245,bg=colour236] #I #[fg=colour250,bg=colour236]#W #[default]"
setw -g window-status-current-format "#[fg=colour16,bg=colour45,bold] #I #[fg=colour231,bg=colour39,bold]#W #[default]"
setw -g window-status-activity-style fg=colour220,bg=colour236,bold
setw -g window-status-bell-style fg=colour196,bg=colour236,bold
setw -g window-status-last-style fg=colour117,bg=colour236

# Pane borders
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour45

# Messages / selection mode
set -g message-style bg=colour235,fg=colour229,bold
set -g mode-style bg=colour238,fg=colour231

##### =========================================================
##### End of config
# --- TPM plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
