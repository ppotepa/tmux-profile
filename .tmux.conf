##### =========================================================
##### TMUX CONFIG — ULTIMATE WASD ONE-HAND PROFILE (v4)
##### =========================================================

# Mark profile loaded
set -g @wsad_profile "loaded"

##### -----------------------------
##### Prefix
##### -----------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### -----------------------------
##### Core settings
##### -----------------------------
set -g mouse on
set -g history-limit 50000
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename on
set -sg escape-time 0
set -g detach-on-destroy off

# Terminal colors
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

##### -----------------------------
##### Remove defaults we override
##### -----------------------------
unbind %
unbind '"'
unbind q
unbind w
unbind d

##### -----------------------------
##### One-hand WASD pane layout
##### -----------------------------

# Split panes
bind q split-window -v -c "#{pane_current_path}"
bind e split-window -h -c "#{pane_current_path}"

# Pane movement
bind a select-pane -L
bind s select-pane -D
bind w select-pane -U
bind d select-pane -R

# Pane resize
bind -r A resize-pane -L 5
bind -r S resize-pane -D 5
bind -r W resize-pane -U 5
bind -r D resize-pane -R 5

# Pane utilities
bind z resize-pane -Z
bind v copy-mode
bind f display-panes
set -g display-panes-time 2000
bind Space next-layout

##### -----------------------------
##### Left-hand no-prefix extensions
##### -----------------------------
bind -n M-a select-pane -L
bind -n M-s select-pane -D
bind -n M-w select-pane -U
bind -n M-d select-pane -R

bind -n M-1 select-window -t:=1
bind -n M-2 select-window -t:=2
bind -n M-3 select-window -t:=3
bind -n M-4 select-window -t:=4
bind -n M-5 select-window -t:=5
bind -n M-6 select-window -t:=6
bind -n C-1 select-window -t:=1
bind -n C-2 select-window -t:=2
bind -n C-3 select-window -t:=3
bind -n C-4 select-window -t:=4
bind -n C-5 select-window -t:=5
bind -n C-6 select-window -t:=6

##### -----------------------------
##### Pane / window helpers
##### -----------------------------
bind Q swap-pane -U
bind E swap-pane -D
bind t command-prompt -I "#W" "rename-window %%"
bind ` set-option status
bind V paste-buffer
bind F choose-tree -s
bind Z resize-pane -Z \; set-option status

##### -----------------------------
##### Windows
##### -----------------------------
bind c new-window -c "#{pane_current_path}"
bind g choose-window
bind Tab last-window

bind 1 select-window -t:=1
bind 2 select-window -t:=2
bind 3 select-window -t:=3
bind 4 select-window -t:=4
bind 5 select-window -t:=5
bind 6 select-window -t:=6

# Assign current window to slot
bind ! move-window -t:=1 \; select-window -t:=1 \; display-message "Window moved to slot 1"
bind @ move-window -t:=2 \; select-window -t:=2 \; display-message "Window moved to slot 2"
bind \# move-window -t:=3 \; select-window -t:=3 \; display-message "Window moved to slot 3"
bind '$' move-window -t:=4 \; select-window -t:=4 \; display-message "Window moved to slot 4"
bind % move-window -t:=5 \; select-window -t:=5 \; display-message "Window moved to slot 5"
bind ^ move-window -t:=6 \; select-window -t:=6 \; display-message "Window moved to slot 6"

##### -----------------------------
##### Sessions
##### -----------------------------
# New named session
bind S command-prompt -p "Session name:" "new-session -A -s '%%'"

# Session picker / tree
bind C-s choose-tree -s

# Previous / next session
bind "(" switch-client -p
bind ")" switch-client -n

# Jump back to last session
bind l switch-client -l

# Kill current session
bind C-x confirm-before -p "Kill session #S? (y/n)" kill-session

##### -----------------------------
##### Function keys
##### -----------------------------
bind F5 choose-tree
bind F6 detach-client

##### -----------------------------
##### Safety / utilities
##### -----------------------------
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
bind x confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind X confirm-before -p "Kill window #I:#W? (y/n)" kill-window
bind / command-prompt -p "Find window" "find-window '%%'"

##### -----------------------------
##### Mouse session switching
##### -----------------------------
# Use Alt+wheel to switch tmux sessions
bind -n M-WheelUpStatus switch-client -p
bind -n M-WheelDownStatus switch-client -n
bind -n M-WheelUpPane switch-client -p
bind -n M-WheelDownPane switch-client -n

##### =========================================================
##### DARK GAMER THEME
##### =========================================================
set -g status-position bottom
set -g status-style bg=colour234,fg=colour250
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=colour81,bg=colour236,bold] #S #[default]"
set -g status-right "#[fg=colour245]#(whoami)@#H #[fg=colour240]| #[fg=colour229]%Y-%m-%d #[fg=colour111]%H:%M #[default]"
set -g window-status-separator " "

setw -g window-status-format "#[fg=colour245,bg=colour236] #I #[fg=colour250,bg=colour236]#W #[default]"
setw -g window-status-current-format "#[fg=colour16,bg=colour45,bold] #I #[fg=colour231,bg=colour39,bold]#W #[default]"
setw -g window-status-activity-style fg=colour220,bg=colour236,bold
setw -g window-status-bell-style fg=colour196,bg=colour236,bold
setw -g window-status-last-style fg=colour117,bg=colour236

set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour45

set -g message-style bg=colour235,fg=colour229,bold
set -g mode-style bg=colour238,fg=colour231

##### =========================================================
##### TPM plugins
##### =========================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'omerxx/tmux-floax'

##### Plugin settings
set -g @floax-bind 'p'

# Resurrect / Continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-pane-contents-area 'full'
# Prevent restore from overwriting an already-running pane/session.
set -g @resurrect-never-overwrite 'on'
# Additional long-running CLIs to restore (defaults are kept automatically).
set -g @resurrect-processes '"~codex" node npm yarn pnpm'

##### Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
