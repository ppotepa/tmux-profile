##### =========================================================
##### TMUX CONFIG — WASD one-hand profile + dark theme (F-key edition)
##### Prefix: Ctrl+A
##### =========================================================

# Mark this profile as loaded (useful for debugging)
set -g @wsad_profile "loaded"

##### -----------------------------
##### Prefix (main tmux command key)
##### -----------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### -----------------------------
##### Core quality-of-life settings
##### -----------------------------
# Mouse support (pane selection, resizing, scrolling)
set -g mouse on

# Bigger scrollback buffer (useful for logs)
set -g history-limit 50000

# Vim-like keys in copy mode
setw -g mode-keys vi

# Window/pane numbering starts at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows automatically after closing one
set -g renumber-windows on

# Auto-rename windows based on current command
set -g automatic-rename on

# Make ESC/reactive key handling snappier (great for Vim)
set -sg escape-time 0

# Keep tmux client detached instead of killing everything when things close
set -g detach-on-destroy off

# Terminal color settings (modern terminals)
# If you get errors or weird colors on older systems, switch to:
# set -g default-terminal "screen-256color"
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

##### -----------------------------
##### Remove default bindings we override
##### -----------------------------
unbind %
unbind '"'
unbind q
unbind w
unbind d

##### -----------------------------
##### One-hand WASD layout (prefix + key)
##### -----------------------------

# Split panes (Q/E = build keys)
# q = horizontal split (top/bottom)
# e = vertical split (left/right)
bind q split-window -v -c "#{pane_current_path}"
bind e split-window -h -c "#{pane_current_path}"

# Pane movement (WASD)
bind a select-pane -L
bind s select-pane -D
bind w select-pane -U
bind d select-pane -R

# Pane resize (Shift+WASD = "sprint resize")
bind -r A resize-pane -L 5
bind -r S resize-pane -D 5
bind -r W resize-pane -U 5
bind -r D resize-pane -R 5

# Pane utilities
bind z resize-pane -Z                  # Zoom/unzoom active pane
bind v copy-mode                       # Enter copy mode (moved from [)
bind f display-panes                   # Show pane numbers (moved from q)
bind Space next-layout                 # Cycle pane layouts

##### -----------------------------
##### Windows (tabs)
##### -----------------------------
# New window opens in current pane directory
bind c new-window -c "#{pane_current_path}"

# Window chooser/list (moved from w)
bind g choose-window

# Toggle back to previous window
bind Tab last-window

# RTS-style "control groups" — jump to window 1..6
bind 1 select-window -t:=1
bind 2 select-window -t:=2
bind 3 select-window -t:=3
bind 4 select-window -t:=4
bind 5 select-window -t:=5
bind 6 select-window -t:=6

# RTS-style "assign current window to slot" (Shift+1..6 on US layout)
# Note: On some keyboard layouts/terminals these symbols may differ.
bind ! move-window -t:=1 \; select-window -t:=1 \; display-message "Window moved to slot 1"
bind @ move-window -t:=2 \; select-window -t:=2 \; display-message "Window moved to slot 2"
bind \# move-window -t:=3 \; select-window -t:=3 \; display-message "Window moved to slot 3"
bind '$' move-window -t:=4 \; select-window -t:=4 \; display-message "Window moved to slot 4"
bind % move-window -t:=5 \; select-window -t:=5 \; display-message "Window moved to slot 5"
bind ^ move-window -t:=6 \; select-window -t:=6 \; display-message "Window moved to slot 6"

##### -----------------------------
##### Session / tree / detach (F-key edition)
##### -----------------------------
bind F5 choose-tree                    # Sessions + windows + panes browser
bind F6 detach-client                  # Detach (tmux keeps running in background)

##### -----------------------------
##### Utility / safety bindings
##### -----------------------------
# Reload config (use after editing ~/.tmux.conf)
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Safe close pane/window with confirmation
bind x confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind X confirm-before -p "Kill window #I:#W? (y/n)" kill-window

# Find window by name/content (default f is reused for display-panes)
bind / command-prompt -p "Find window" "find-window '%%'"

# Optional dev layout launcher (works only if script exists at ~/.local/bin/tmux-dev-layout)
bind b run-shell "~/.local/bin/tmux-dev-layout \"#{pane_current_path}\""

##### =========================================================
##### DARK GAMER THEME (status bar + windows + panes)
##### =========================================================

# Status bar placement and base colors
set -g status-position bottom
set -g status-style bg=colour234,fg=colour250

# Left/right status segments
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=colour81,bg=colour236,bold] #S #[default]"
set -g status-right "#[fg=colour245]#(whoami)@#H #[fg=colour240]| #[fg=colour229]%Y-%m-%d #[fg=colour111]%H:%M #[default]"

# Space between window entries in the status line
set -g window-status-separator " "

##### Window tabs (dark + highlighted active)
# Inactive window style
setw -g window-status-format "#[fg=colour245,bg=colour236] #I #[fg=colour250,bg=colour236]#W #[default]"

# Active window style (bright highlight)
setw -g window-status-current-format "#[fg=colour16,bg=colour45,bold] #I #[fg=colour231,bg=colour39,bold]#W #[default]"

# Window with activity (new output)
setw -g window-status-activity-style fg=colour220,bg=colour236,bold

# Window with bell
setw -g window-status-bell-style fg=colour196,bg=colour236,bold

# Last-used window style
setw -g window-status-last-style fg=colour117,bg=colour236

##### Pane borders
# Inactive pane border
set -g pane-border-style fg=colour238

# Active pane border (highlighted)
set -g pane-active-border-style fg=colour45

# If you want pane titles on borders, uncomment below:
# set -g pane-border-status top
# set -g pane-border-format " #P #{pane_current_command} "

##### Messages / selection mode
# Status messages (e.g., reload confirmations)
set -g message-style bg=colour235,fg=colour229,bold

# Selection/copy mode highlight
set -g mode-style bg=colour238,fg=colour231

##### =========================================================
##### End of config
# --- TPM plugins (session restore) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Optional: automatic save/restore
set -g @plugin 'tmux-plugins/tmux-continuum'

# Continuum optional defaults (uncomment if you want auto behavior)
# set -g @continuum-restore 'on'
# set -g @continuum-save-interval '15'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
