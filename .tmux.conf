##### =========================================================
##### WSAD / WASD ONE-HAND TMUX PROFILE v2 (F-key edition)
##### Left-hand zone focus: Q W E A S D F G, 1..6, Space, F5/F6
##### Includes:
##### - Gamer movement/resizing
##### - RTS-style window control groups
##### - Dev layout launcher hook
##### =========================================================

##### --- Prefix ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### --- Core basics / QoL ---
set -g mouse on
set -g history-limit 50000
setw -g mode-keys vi

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g automatic-rename on

set -sg escape-time 0
set -g detach-on-destroy off

# If tmux-256color causes issues on older systems, use screen-256color
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

set -g status-position bottom
set -g status-right "%H:%M"

##### --- Remove defaults we override ---
unbind %
unbind '"'
unbind w
unbind d
unbind q

##### --- Splits (Q/E = build) ---
# q = horizontal split (top/bottom)
# e = vertical split (left/right)
bind q split-window -v -c "#{pane_current_path}"
bind e split-window -h -c "#{pane_current_path}"

##### --- Pane movement (WASD) ---
bind a select-pane -L
bind s select-pane -D
bind w select-pane -U
bind d select-pane -R

##### --- Pane resizing (Shift+WASD = sprint resize) ---
bind -r A resize-pane -L 5
bind -r S resize-pane -D 5
bind -r W resize-pane -U 5
bind -r D resize-pane -R 5

##### --- Pane utility ---
bind z resize-pane -Z                  # zoom / unzoom pane
bind v copy-mode                       # enter copy mode (moved from [)
bind f display-panes                   # show pane numbers (moved from q)
bind Space next-layout                 # cycle layouts

##### --- Windows (tabs) ---
bind c new-window -c "#{pane_current_path}"
bind g choose-window                   # window chooser (moved from w)
bind Tab last-window                   # quick toggle to previous window

# RTS-style "control groups": select windows 1..6
bind 1 select-window -t:=1
bind 2 select-window -t:=2
bind 3 select-window -t:=3
bind 4 select-window -t:=4
bind 5 select-window -t:=5
bind 6 select-window -t:=6

# RTS-style "assign current window to slot" (Shift+1..6 on US layout)
# If your keyboard layout makes these awkward, remap later.
bind ! move-window -t:=1 \; select-window -t:=1 \; display-message "Window moved to slot 1"
bind @ move-window -t:=2 \; select-window -t:=2 \; display-message "Window moved to slot 2"
bind \# move-window -t:=3 \; select-window -t:=3 \; display-message "Window moved to slot 3"
bind '$' move-window -t:=4 \; select-window -t:=4 \; display-message "Window moved to slot 4"
bind % move-window -t:=5 \; select-window -t:=5 \; display-message "Window moved to slot 5"
bind ^ move-window -t:=6 \; select-window -t:=6 \; display-message "Window moved to slot 6"

##### --- Session / tree / detach ---
bind F5 choose-tree                    # sessions + windows + panes browser
bind F6 detach-client                  # detach (moved from d)

##### --- Dev layout launcher (external script) ---
# Runs layout creator in current pane path. If session exists, it switches/attaches.
bind b run-shell "~/.local/bin/tmux-dev-layout \"#{pane_current_path}\""

##### --- Safe close / reload ---
bind x confirm-before -p "Kill pane #P? (y/n)" kill-pane
bind X confirm-before -p "Kill window #I:#W? (y/n)" kill-window
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

##### --- Small helpers (optional but handy) ---
# Find window by name/content (default tmux has 'f' find-window; we moved 'f' to display-panes)
